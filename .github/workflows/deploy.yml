name: Build and Deploy Tiles

on:
  # Triggered by pvc-trades when data.json changes
  repository_dispatch:
    types: [tiles-rebuild]
  # Manual trigger
  workflow_dispatch:
  # Scheduled: daily at 06:00 UTC
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: tiles-deploy
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Source tiles: fetched from Dynmap/BlueMap — stable key
      - name: Restore source tile cache
        id: source-tile-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: public/tiles-src
          key: map-tiles-src-v1-${{ github.run_id }}
          restore-keys: |
            map-tiles-src-v1-

      # Canonical tiles: rendered output — key includes format version
      - name: Restore canonical tile cache
        id: canonical-tile-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: public/tiles
          key: map-tiles-canonical-png-v9-${{ github.run_id }}
          restore-keys: |
            map-tiles-canonical-png-v9-

      - name: Fetch map tiles (only missing)
        run: npm run fetch-tiles

      - name: Render canonical tiles
        env:
          RENDER_CONCURRENCY: 2
        run: npm run render-tiles

      - name: Validate tile integrity
        run: npm run validate-tiles

      - name: Save source tile cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: public/tiles-src
          key: map-tiles-src-v1-${{ github.run_id }}

      - name: Save canonical tile cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: public/tiles
          key: map-tiles-canonical-png-v9-${{ github.run_id }}

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy
          cp -r public/tiles/* deploy/ || true

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
